; Questa/ModelSim project configuration for Round-Robin Arbiter
; Inherits from installation and overrides work library location

[Library]
others = $QUESTASIM_DIR/../modelsim.ini
work = sim/work

[DefineOptionset]
; UVM debugging
UVMDEBUG = -uvmcontrol=all -msgmode both -displaymsgmode both -classdebug -onfinish stop
; vopt debugging
VOPTDEBUG = +acc -debugdb
